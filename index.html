<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NL.TEAM | نظام الطلبات</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background: #f4f4f4; text-align: center; }
        .step { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="step1" class="step">
        <h1>مرحباً بك في NL.TEAM 👋</h1>
        <select id="orderItem">
            <option value="سناك 1">سناك 1 - 5€</option>
            <option value="سناك 2">سناك 2 - 7€</option>
        </select>
        <button onclick="nextStep(2)">التالي</button>
    </div>

    <div id="step2" class="step" style="display:none;">
        <h1>بيانات التوصيل 📍</h1>
        <input type="text" id="customerName" placeholder="الاسم الكامل">
        <input type="text" id="address" placeholder="العنوان في دوتينخيم">
        <button onclick="nextStep(3)">التالي</button>
    </div>

    <div id="step3" class="step" style="display:none;">
        <h1>اللمسة الأخيرة 📝</h1>
        <input type="tel" id="phone" placeholder="رقم الواتساب (مثال: 316...)">
        <textarea id="notes" placeholder="ملاحظات إضافية"></textarea>
        <button onclick="submitOrder()">تأكيد الطلب</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXIty5TGVNu37oLDYtWFjgA-pLcnqgEmU",
            databaseURL: "https://nl-team-default-rtdb.europe-west1.firebasedatabase.app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.nextStep = (step) => {
            document.querySelectorAll('.step').forEach(s => s.style.display = 'none');
            document.getElementById('step' + step).style.display = 'block';
        };

        window.submitOrder = () => {
            const data = {
                item: document.getElementById("orderItem").value,
                customer: document.getElementById("customerName").value,
                address: document.getElementById("address").value,
                phone: document.getElementById("phone").value,
                notes: document.getElementById("notes").value,
                status: "جديد",
                timestamp: Date.now()
            };
            push(ref(db, 'orders/'), data).then(() => alert("تم إرسال طلبك! بنشوفك قريباً."));
        };
    </script>
</body>
</html>
